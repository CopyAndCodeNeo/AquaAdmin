<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaScan - Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-firestore.js"></script>
</head>
<body id="analytics-page">
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="bg-dark border-right" id="sidebar-wrapper">
            <div class="sidebar-heading text-white">AquaScan Admin</div>
            <div class="list-group list-group-flush">
                <a href="dashboard.html" class="list-group-item list-group-item-action bg-dark text-white">Dashboard</a>
                <a href="scans.html" class="list-group-item list-group-item-action bg-dark text-white">Scan Records</a>
                <a href="fishfreshness.html" class="list-group-item list-group-item-action bg-dark text-white">Fish Freshness</a>
                <a href="dataset.html" class="list-group-item list-group-item-action bg-dark text-white">Image Dataset</a>
                <a href="users.html" class="list-group-item list-group-item-action bg-dark text-white">Users</a>
                <a href="training-data.html" class="list-group-item list-group-item-action bg-dark text-white">Model Training Data</a>
                <a href="model-status.html" class="list-group-item list-group-item-action bg-dark text-white">Model Status</a>
                <a href="analytics.html" class="list-group-item list-group-item-action bg-dark text-white active">Analytics</a>
                <a href="system-logs.html" class="list-group-item list-group-item-action bg-dark text-white">System Logs</a>
                <a href="settings.html" class="list-group-item list-group-item-action bg-dark text-white">Settings</a>
            </div>
        </div>
        <!-- /#sidebar-wrapper -->

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                <div class="container-fluid">
                    <button class="btn btn-primary" id="menu-toggle">Toggle Menu</button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
                            <li class="nav-item dropdown">
                                <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                    <span id="admin-name"></span>
                                </a>
                                <div class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                                    <a class="dropdown-item" href="settings.html">Settings</a>
                                    <div class="dropdown-divider"></div>
                                    <a class="dropdown-item" href="#" id="logout-btn-top">Logout</a>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>

            <div class="container-fluid px-4">
                <h1 class="mt-4">Analytics</h1>

                <!-- Date Range Filter -->
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <form id="date-range-form" class="row g-3 align-items-center">
                            <div class="col-md-5">
                                <label for="start-date" class="form-label">Start Date</label>
                                <input type="date" class="form-control" id="start-date">
                            </div>
                            <div class="col-md-5">
                                <label for="end-date" class="form-label">End Date</label>
                                <input type="date" class="form-control" id="end-date">
                            </div>
                            <div class="col-md-2 d-flex align-items-end">
                                <button type="submit" class="btn btn-primary w-100">Apply</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Charts -->
                <div class="row" id="charts-container">
                    <div class="col-lg-6 mb-4">
                        <div class="card shadow-sm"><div class="card-header">Daily Scan Activity</div><div class="card-body"><canvas id="daily-scan-chart"></canvas></div></div>
                    </div>
                    <div class="col-lg-6 mb-4">
                        <div class="card shadow-sm"><div class="card-header">Fresh vs Not Fresh</div><div class="card-body"><canvas id="freshness-chart"></canvas></div></div>
                    </div>
                    <div class="col-lg-6 mb-4">
                        <div class="card shadow-sm"><div class="card-header">Species Distribution</div><div class="card-body"><canvas id="species-chart"></canvas></div></div>
                    </div>
                    <div class="col-lg-6 mb-4">
                        <div class="card shadow-sm"><div class="card-header">Dataset Growth</div><div class="card-body"><canvas id="dataset-growth-chart"></canvas></div></div>
                    </div>
                </div>

            </div>
        </div>
        <!-- /#page-content-wrapper -->
    </div>
    <!-- /#wrapper -->

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/main.js"></script>
    <script src="js/analytics.js"></script>
</body>
</html>

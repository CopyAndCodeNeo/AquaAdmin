<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaScan - Settings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-firestore.js"></script>
</head>
<body id="settings-page">
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="bg-dark border-right" id="sidebar-wrapper">
            <div class="sidebar-heading text-white">AquaScan Admin</div>
            <div class="list-group list-group-flush">
                <a href="dashboard.html" class="list-group-item list-group-item-action bg-dark text-white">Dashboard</a>
                <a href="scans.html" class="list-group-item list-group-item-action bg-dark text-white">Scan Records</a>
                <a href="fishfreshness.html" class="list-group-item list-group-item-action bg-dark text-white">Fish Freshness</a>
                <a href="dataset.html" class="list-group-item list-group-item-action bg-dark text-white">Image Dataset</a>
                <a href="users.html" class="list-group-item list-group-item-action bg-dark text-white">Users</a>
                <a href="training-data.html" class="list-group-item list-group-item-action bg-dark text-white">Model Training Data</a>
                <a href="model-status.html" class="list-group-item list-group-item-action bg-dark text-white">Model Status</a>
                <a href="analytics.html" class="list-group-item list-group-item-action bg-dark text-white">Analytics</a>
                <a href="system-logs.html" class="list-group-item list-group-item-action bg-dark text-white">System Logs</a>
                <a href="settings.html" class="list-group-item list-group-item-action bg-dark text-white active">Settings</a>
            </div>
        </div>
        <!-- /#sidebar-wrapper -->

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
                <div class="container-fluid">
                    <button class="btn btn-primary" id="menu-toggle">Toggle Menu</button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
                            <li class="nav-item dropdown">
                                <a class="nav-link dropdown-toggle" id="navbarDropdown" href="#" role="button" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                    <span id="admin-name"></span>
                                </a>
                                <div class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                                    <a class="dropdown-item" href="settings.html">Settings</a>
                                    <div class="dropdown-divider"></div>
                                    <a class="dropdown-item" href="#" id="logout-btn-top">Logout</a>
                                </div>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>

            <div class="container-fluid px-4">
                <h1 class="mt-4">Settings</h1>

                <div class="row">
                    <div class="col-lg-6">
                        <!-- Admin Profile -->
                        <div class="card shadow-sm mb-4">
                            <div class="card-header">Admin Profile</div>
                            <div class="card-body">
                                <form id="admin-profile-form">
                                    <div class="mb-3">
                                        <label for="admin-profile-name" class="form-label">Name</label>
                                        <input type="text" class="form-control" id="admin-profile-name" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="admin-profile-email" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="admin-profile-email" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary">Update Profile</button>
                                </form>
                            </div>
                        </div>

                        <!-- Change Password -->
                        <div class="card shadow-sm mb-4">
                            <div class="card-header">Change Password</div>
                            <div class="card-body">
                                <form id="change-password-form">
                                    <div class="mb-3">
                                        <label for="current-password" class="form-label">Current Password</label>
                                        <input type="password" class="form-control" id="current-password" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="new-password" class="form-label">New Password</label>
                                        <input type="password" class="form-control" id="new-password" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary">Change Password</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-6">
                        <!-- App Configuration -->
                        <div class="card shadow-sm">
                            <div class="card-header">Application Configuration</div>
                            <div class="card-body">
                                <ul class="list-group list-group-flush">
                                    <li class="list-group-item"><strong>Firebase Project ID:</strong> <span id="fb-project-id"></span></li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- /#page-content-wrapper -->
    </div>
    <!-- /#wrapper -->

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>

<title>AquaScan Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.6.8/firebase-firestore.js"></script>

</head>

<body class="bg-light">

<div class="container vh-100 d-flex justify-content-center align-items-center">

<div class="card shadow p-4" style="width:380px">

<h3 class="text-center mb-4 text-primary">AquaScan Admin</h3>

<form id="login-form">

<input type="email" id="email" class="form-control mb-3" placeholder="Admin Email" required>

<input type="password" id="password" class="form-control mb-3" placeholder="Password" required>

<button class="btn btn-primary w-100">Login</button>

<p id="login-error" class="text-danger mt-2"></p>

</form>

</div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
